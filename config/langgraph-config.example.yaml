# protoAgent — LangGraph runtime configuration
#
# The template ships with a single ``researcher`` subagent and no knowledge
# store. Fork this file to match your agent's skills / subagents /
# middleware needs. Anything referenced here must also have a matching
# entry in ``graph/subagents/config.py`` (for subagents) or a tool
# registered in ``tools/lg_tools.py``.

model:
  provider: openai
  # Default LiteLLM gateway alias. Set an alias called ``protolabs/reasoning``
  # (or whatever you rename it to) in your gateway config pointing at the
  # real model — swapping the model becomes a gateway edit, not a code
  # change in the fork.
  name: protolabs/reasoning
  api_base: http://gateway:4000/v1
  api_key: ""  # falls back to OPENAI_API_KEY env
  temperature: 0.2
  max_tokens: 32768  # 32k — required headroom for the Qwen models we run
  max_iterations: 50
  # Native image input — set true when `name` is a vision model (protolabs/fast,
  # protolabs/smart, protolabs/reasoning/deepseek-v4). Chat then sends attached
  # images straight to the model instead of through the extraction pipeline.
  vision: false
  request_timeout: 120   # per-call timeout (s) on the model client — bounds a hung/slow gateway
  max_retries: 2         # transient-error retries inside the client
  # Advanced sampling — all optional; omit to use the gateway / model-card
  # defaults. top_p + presence_penalty are standard OpenAI params; top_k +
  # repetition_penalty + chat_template_kwargs ride extra_body for vLLM-style
  # gateways. Typical self-hosted Qwen card:
  #   top_p: 0.95
  #   top_k: 20
  #   presence_penalty: 0.0
  #   repetition_penalty: 1.05
  #   chat_template_kwargs: { preserve_thinking: true }
  # Reasoning controls for OpenAI-compatible reasoning models (DeepSeek, the
  # OpenAI o-series). Both opt-in; omit to inherit the provider default.
  # `thinking` rides extra_body (enabled|disabled); `reasoning_effort` is sent
  # top-level (low|medium|high|max). NOTE: with thinking on, DeepSeek ignores
  # temperature / top_p / penalties.
  #   thinking: enabled
  #   reasoning_effort: high

subagents:
  researcher:
    enabled: true
    tools:
      - current_time
      - web_search
      - fetch_url
      - memory_recall
      - memory_list
    max_turns: 40
    # Per-subagent model override (blank = routing.aux_model, then the main model).
    # Pin a heavy-reasoning subagent to the main model even when aux_model routes
    # the rest to a cheaper alias, e.g.:  model: protolabs/reasoning
    model: ""

middleware:
  # All four subsystems default ON. The template constructs the
  # knowledge store + scheduler backends automatically (see
  # ``server.py::_build_knowledge_store`` and ``_build_scheduler``).
  # Flip any of these to ``false`` to opt out — the corresponding
  # tools (memory_*, schedule_*) are dropped from the agent loop
  # without touching the researcher subagent's tool allowlist.
  knowledge: true
  audit: true
  memory: true
  scheduler: true

knowledge:
  db_path: /sandbox/knowledge/agent.db
  # Semantic recall: hybrid FTS5 + vector search (RRF-fused) via embed_model.
  # Off by default (keyword-only) — turn on once your gateway serves an
  # embedding model. Degrades to keyword search on embedding outage.
  # Hybrid semantic + keyword recall (RRF). On by default; falls back to
  # keyword-only via the circuit breaker if the gateway can't embed.
  embeddings: true
  # The embedding model your gateway serves (NOT the chat model). Default is the
  # protoLabs gateway's; forks on another gateway set theirs (check GET /v1/models).
  embed_model: qwen3-embedding
  # Speech-to-text model for audio/video ingestion — the gateway's OpenAI-compatible
  # /audio/transcriptions alias (e.g. whisper-1). Blank disables audio/video import.
  # Video needs ffmpeg on the host to extract the audio track.
  transcribe_model: whisper-1
  # Extract durable facts from a conversation on retirement (aux model) and
  # consolidate them into the store. Rides the harvest pass (ADR 0021).
  facts: true
  top_k: 5
  # Document chunking on ingest (ADR 0021) — large bodies (conversation
  # summaries, pasted docs) are split into overlapping passages BEFORE
  # embedding, so each passage gets its own vector instead of one diluted
  # whole-doc embedding. Content under chunk_max_chars (facts/notes) isn't
  # split. Defaults shown; omit to use them.
  # chunk_max_chars: 1200      # target ceiling per chunk
  # chunk_overlap_chars: 150   # shared tail between adjacent chunks (boundary safety)
  # chunk_min_chars: 200       # fold a trailing fragment below this into the prior chunk
  # Contextual Retrieval (ADR 0021, Anthropic) — when a doc splits, prepend a
  # one-line aux-LLM context situating each chunk in the whole document before
  # embedding/indexing. Lifts both semantic + keyword recall. Costs one aux call
  # per chunk at INGEST (not on the query path), so off by default.
  # contextual_enrichment: false
  # context_max_doc_chars: 12000   # cap the document text sent in the context prompt

# Session memory loading — prior summaries injected into system prompt
# by KnowledgeMiddleware when it is active. Persistence via MemoryMiddleware
# uses the same path. Mount a volume at this path to survive container restarts.
memory:
  path: /sandbox/memory/
  max_sessions: 10
  max_tokens: 2000

# Skill index — SQLite FTS5 store for learned skill-v1 artifacts.
# Skills emitted by task() are indexed here and injected into the system
# prompt as a <learned_skills> block at inference time.
skills:
  db_path: /sandbox/skills.db
  top_k: 5
  max_tokens: 2000
  # Tier (ADR 0041 slice 3): scope = scoped (private) | shared (one commons for all)
  # | layered (read commons ∪ private, write private, promote to commons). Blank →
  # derived from `shared` below. `python -m server skills promote <name>` lifts a
  # private skill into the commons.
  # scope: scoped
  # Tiered stores (ADR 0041). `shared: true` lifts the skills library into the
  # COMMONS — one DB read/written by every agent on this host (a fleet's compounding
  # skill library) — instead of per-instance scope. Default false = private per
  # instance. Pairs with multiple agents isolated via `instance.id`.
  shared: false

# Shared commons (ADR 0041) — base dir for `shared` stores; blank → ~/.protoagent/commons.
# commons:
#   path: ""

# A2A card identity (#570) — declare your fork's advertised skills + card
# description HERE (or contribute skills from a plugin via register_a2a_skill)
# rather than editing server/a2a.py. Omit both and the template ships one
# free-text "chat" placeholder so a fresh clone stays callable. The card `name`
# already follows identity.name / AGENT_NAME.
a2a:
  # Deploy-time guard: refuse to start if the card would advertise a loopback URL
  # (e.g. A2A_PUBLIC_URL unset on a deployed agent → http://127.0.0.1:.../a2a,
  # unreachable to remote consumers). Leave off for local/desktop runs (loopback
  # is correct same-host); turn ON for any agent other agents dial over the network.
  # require_routable_url: true
  # description: "Acme Bot — turns support tickets into triaged, drafted replies."
  # skills:
  #   - id: triage_ticket
  #     name: Triage Ticket
  #     description: Classify a support ticket and draft a reply.
  #     tags: [support]
  #     examples: ["triage ticket #1234"]
  #     # Structured output (optional): the executor enforces the schema (#476)
  #     # and emits a typed DataPart advertised in the card's output_modes.
  #     # result_mime: application/vnd.protolabs.triage-v1+json
  #     # output_schema: { type: object, properties: { ... }, required: [ ... ] }

# Outbound A2A SSRF guard (#572) — opt-in CIDR allowlist for the destinations
# the agent POSTs to: push-notification callbacks (caller-supplied) + delegate_to
# a2a delegates. Empty/unset = today's behavior (callbacks keep their
# default private-IP denylist; delegate_to is unrestricted). When set, a
# destination is allowed only if every resolved IP falls inside a listed CIDR —
# e.g. lock outbound to your tailnet / private fleet network.
security:
  # callback_allowlist:
  #   - 100.64.0.0/10   # tailnet
  #   - 10.0.0.0/8      # private fleet

# Workflows — reusable declarative multi-step subagent recipes (ADR 0002),
# run via the run_workflow tool. Bundled examples ship in the repo workflows/
# dir; `dir` is the writable root for user/agent-emitted recipes (same
# /sandbox→~/.protoagent fallback as the stores).
workflows:
  enabled: true
  dir: /sandbox/workflows

# Context compaction — summarize old history near the context limit so long
# sessions don't overflow the window. ON by default.
#   trigger: "fraction:0.8" | "tokens:120000" | "messages:80"
# NOTE: "fraction:"/"tokens:" need the model's context-window profile. A custom
# gateway alias usually lacks one, so the wiring auto-falls back to a
# message-count trigger (logged). Set "messages:N" explicitly to be deterministic.
#   model: a cheaper/faster alias to summarize with (blank = main model).
compaction:
  enabled: true
  trigger: "fraction:0.8"
  keep_messages: 20
  # model: protolabs/fast

# Conversation checkpointer — persists each chat session's history per
# thread_id so multi-turn chats survive a server restart. Same
# /sandbox→~/.protoagent writable fallback as the stores. Blank = in-memory
# (history cleared on restart).
checkpoint:
  db_path: /sandbox/checkpoints.db
  # Pruning keeps the DB bounded: keep the latest N checkpoints per session,
  # and drop whole sessions idle past max_age_days. Swept every
  # prune_interval_hours (0 disables the sweep).
  keep_per_thread: 5
  max_age_days: 30
  prune_interval_hours: 6
  # When a session is retired (aged out or deleted), summarize it into the
  # knowledge base (searchable via memory_recall) before dropping the raw
  # checkpoints. Needs the knowledge middleware enabled.
  harvest_enabled: true

# Model routing / failover.
#   aux_model: ONE cheap/fast alias for the non-reasoning calls — context
#     summarization, goal verification, and subagent delegation all fall back
#     to it unless they set a specific override. Blank = main model everywhere.
#     Can also be an `acp:<agent>` (e.g. acp:claude) to route those aux calls
#     through a coding agent instead of a gateway model — same for goal.eval_model
#     and compaction.model. (The main brain itself is selected via agent_runtime.)
#   fallback_models: on a primary error, retry on each in order. Empty = none.
routing:
  # aux_model: protolabs/fast
  fallback_models: []
  #  - claude-haiku-4-5

# Goal mode — route the goal verifier to a cheaper model with `eval_model`
# (else it uses routing.aux_model, else the main model).
goal:
  # eval_model: protolabs/fast
  max_iterations: 8

# Programmatic tool calling — let the model write ONE Python script that
# composes several tools in a single turn (collapses long tool-call chains).
# SECURITY: runs model-authored code in a subprocess (scrubbed env + hard
# timeout). OFF by default — only enable for trusted models or inside a
# hardened container. `tools: []` exposes all tools except execute_code itself.
execute_code:
  enabled: false
  timeout: 30
  tools: []

# Tools — fork customization without editing tools/lg_tools.py.
#   disabled: drop named core tools from the agent (a fork "keeps what it wants"
#     by listing the rest here; plugins still ADD tools). Live-reloadable.
#   deferred: withhold tool schemas until the agent searches for them (cuts the
#     per-turn footprint past ~15 tools). OFF by default.
tools:
  disabled: []
  # - calculator
  # - daily_log
  # deferred:
  #   enabled: false
  #   keep: []

# React operator console — the beads/notes APIs accept a project path from
# the (free-text) UI, so the server, not the client, decides which
# directories they may touch. The protoAgent repo root is always allowed;
# add any other project roots you operate on here. Empty = repo root only.
# Editable in-app from the setup wizard's Workspace step.
operator:
  allowed_dirs: []
  # - /home/kj/projects/my-other-repo

# Box runtime (Host layer, ADR 0047 D8) — box-wide knobs every agent this machine
# owns inherits. These are HOST defaults: best set once in host-config.yaml or the
# Settings ▸ Host / App home (a per-agent value here is a silent no-op — the host
# process reads its own config). Resolution is file > env > default, so the
# PROTOAGENT_HOST / PROTOAGENT_FLEET_MAX_WARM / PROTOAGENT_FLEET_WARM_GRACE env vars
# stay the fallback for env-configured boxes.
network:
  bind: 127.0.0.1           # 0.0.0.0 = all interfaces (token-gate A2A first); --host still wins
fleet:
  port_base: 7870           # fleet workspace agents get port_base+1, +2, …
  discovery:
    port_min: 7860          # LAN/tailnet discovery scan window (inclusive)
    port_max: 7910
    mdns: true              # advertise + browse the _protoagent._tcp mDNS channel
  warm:
    max: 0                  # warm-agent cap (0 = unlimited)
    grace_seconds: 0        # spare agents touched within N seconds from LRU eviction

# Discord surface (ADR 0015/0016) — inbound DM gateway. Configure this in-app
# (setup wizard step / System → Settings → Discord) rather than by hand: the
# bot_token is stored in the gitignored secrets.yaml overlay, never here.
# `admin_ids` are the Discord user IDs allowed to DM the bot (empty = anyone).
# Off until enabled with a token. The DISCORD_BOT_TOKEN / DISCORD_ADMIN_IDS env
# vars remain a fallback for Docker deploys.
discord:
  enabled: false
  # bot_token: stored in secrets.yaml (set via the UI), not here
  admin_ids: []

# Google surface (ADR 0017) — Gmail + Calendar via the bundled MCP server.
# Configure in-app (setup wizard / System → Settings → Google): paste your Google
# Cloud "Desktop app" OAuth client (id + secret → secrets.yaml), then click
# "Connect Google" to run the consent flow (opens your browser) — the token is
# cached in the per-user config dir. When enabled + connected the google MCP
# server is auto-wired (no mcp.servers editing). `tz` sets day bounds for "today".
google:
  enabled: false
  # client_id: set via the UI
  # client_secret: stored in secrets.yaml (set via the UI)
  tz: ""
