id: notes
name: Notes
version: 0.1.0
description: >-
  A single shared markdown note the agent and the operator both read and write.
  The first-class React reference plugin (ADR 0034 S4) — it owns its storage,
  its agent tools, and a `ui: react` console panel. Replaces the legacy native
  Notes surface.
enabled: true            # first-party — shipped on
capabilities:
  network: []
  filesystem: scoped     # one note file in the instance data dir
# A first-class React view (ADR 0034) mounted in the right rail. `path` is the
# iframe fallback for untrusted hosts; `notes` is on the shipped trust allowlist
# (graph/plugins/loader.py) so it mounts in-process.
views:
  - {
      id: notes, label: "Notes", icon: "FileText", placement: right,
      ui: react, path: "/api/plugins/notes/view",
      remote: { url: "/app/remotes/notes/assets/remoteEntry.js", module: "./Panel" },
    }
