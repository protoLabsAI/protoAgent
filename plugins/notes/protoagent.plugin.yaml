id: notes
name: Notes
version: 0.3.0
description: >-
  A single shared markdown note the agent and the operator both read and write.
  The flagship reference plugin (ADR 0034 S4) — it owns its storage, its agent
  tools, and a live-preview markdown editor it serves itself (ADR 0038), with
  CodeMirror vendored so it runs offline. Replaces the legacy native Notes surface.
enabled: true            # first-party — shipped on
capabilities:
  network: []            # literally true since 0.3.0 — CM6 is vendored, no CDN
  filesystem: scoped     # one note file in the instance data dir
# The plugin self-serves its editor page (ADR 0038) — a sandboxed iframe, no host build, so it's
# git-installable like any plugin. (Was a federated `ui: react` remote; federation retired.)
views:
  # Separate panel vs palette views (ADR 0057): the RAIL panel keeps the full editor
  # (`path: /view`), while ⌘K → "Notes" morphs a DISTINCT compact quick-note page
  # (`palette: { path: /quick }`) into the palette body. (`palette: inline` would reuse
  # the same /view page for both.)
  - { id: notes, label: "Notes", icon: "FileText", placement: right, path: "/plugins/notes/view", palette: { path: "/plugins/notes/quick" } }

# The vendored CodeMirror modules the view pages import. `_view_public_paths` auto-exempts
# the view PAGE paths, but an ES-module `import` can't carry an Authorization header any more
# than the iframe navigation can — so these have to be exempt too, or the editor 401s and
# renders as a dead box. This only surfaced on a SISTER agent: members used to run open on
# loopback, and ADR 0089 D5 closed them, so the fleet proxy now forwards these unauthenticated
# requests to a member that (rightly) rejects them. Serving them is safe — `_VENDOR_FILES` is
# an exact-name allowlist, so the subtree can't be walked.
public_paths:
  - "/plugins/notes/vendor/"
