# Hardened local/edge runtime for protoAgent.
#
# `docker compose up --build` runs the agent locked down: read-only root
# filesystem, all Linux capabilities dropped, no privilege escalation, and
# the bundled seccomp-profile.json applied (the Dockerfile ships that profile
# but nothing referenced it until now). The few writable paths are explicit —
# /tmp + /home as ephemeral tmpfs, agent state in named volumes.
#
# Backported from the protoLabs fleet (pwnDeck), generalised to neutral
# defaults. Tune the resource ceiling and ports per deployment.
services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/protolabsai/protoagent:latest
    container_name: protoagent
    restart: unless-stopped

    # Readiness — /healthz is 200 only once the agent graph is ready (503 during
    # cold start). With restart:unless-stopped this lets the daemon detect a
    # hung-but-alive process. start_period covers the first-compile boot.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7870/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

    # ── Hardening ──────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
      - seccomp=seccomp-profile.json
    cap_drop:
      - ALL
    read_only: true

    # ── Writable surfaces ──────────────────────────────────────────────────
    # Ephemeral scratch (tmpfs); uid/gid match the image's non-root sandbox
    # user (Dockerfile SANDBOX_UID=1001). PYTHONDONTWRITEBYTECODE avoids
    # __pycache__ writes against the read-only /opt/protoagent tree.
    tmpfs:
      - /tmp:size=256M,uid=1001,gid=1001
      - /home/sandbox:size=64M,uid=1001,gid=1001
    # Persistent state: /sandbox IS the instance root (PROTOAGENT_HOME=/sandbox) —
    # live config + secrets + setup marker + SOUL.md (/sandbox/config/*), plugins
    # (/sandbox/plugins), knowledge DB, audit log, scheduler jobs all under /sandbox.
    volumes:
      - protoagent-sandbox:/sandbox

    # Published to LOOPBACK only by default: the container binds 0.0.0.0
    # internally (entrypoint), so this host-side port binding is the network
    # boundary. To expose the agent beyond this machine, set A2A_AUTH_TOKEN
    # below AND widen the binding (e.g. "7870:7870").
    ports:
      - "127.0.0.1:7870:7870"

    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - AGENT_NAME=${AGENT_NAME:-protoagent}
      # Bearer for the A2A + operator API — REQUIRED if the port is exposed
      # beyond loopback. With the default 127.0.0.1 publish above, the
      # in-container 0.0.0.0 bind is fenced by the port binding, so the
      # token-less boot gate is opted out via PROTOAGENT_ALLOW_OPEN below.
      - A2A_AUTH_TOKEN=${A2A_AUTH_TOKEN:-}
      - PROTOAGENT_ALLOW_OPEN=${PROTOAGENT_ALLOW_OPEN:-1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Optional Langfuse tracing — left blank disables it.
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}

    # Modest ceiling so a runaway run can't starve the host. Tune per deploy.
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 256M

volumes:
  protoagent-sandbox:
