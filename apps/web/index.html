<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover exposes env(safe-area-inset-*) so the bottom nav / topbar
         can pad clear of the iOS home indicator + notch in the installed PWA.
         interactive-widget=resizes-content makes Chrome 108+ shrink the LAYOUT viewport
         when the on-screen keyboard opens, so `100dvh` already excludes it. iOS Safari
         ignores this directive — that path is handled by lib/useKeyboardInset.ts, which
         measures visualViewport and publishes `--kb-inset`. Both are needed. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#9b87f2" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%protolabs-icon-outline.svg" />
    <!-- Installable PWA: manifest only, deliberately NO service worker — a SW
         would intercept the /a2a SSE stream and cache stale console assets
         (the version-coherence class). The server serves /manifest.json with
         the proper media type; in the Tauri webview this link 404s inertly. -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>protoAgent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
