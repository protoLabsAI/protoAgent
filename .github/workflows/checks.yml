name: Checks

# PR + main gate: enforce the fleet workspace-config standard and run the
# Python test suite. Replaces the prior collect-only smoke in docker-publish.yml
# with a real `pytest` run, and catches .beads/.automaker/runner drift in CI
# instead of as a mid-run failure.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  workspace-config:
    name: Verify workspace config
    runs-on: ubuntu-latest  # workspace-config: allow-hosted-runner public repo — GH-hosted is free
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Verify workspace config (.beads / .automaker / owned runners)
        # The npm package is still 1.0.0 (predates verify-workspace-config),
        # so run the script directly. It's zero-dependency (node builtins
        # only), so no `npm install` is needed. Switch to
        # `npx -p @protolabsai/release-tools verify-workspace-config` once
        # 1.1.0+ is published to npm (protoLabsAI/release-tools#27).
        # Pinned by commit SHA (same supply-chain posture as the
        # release-tools action pin in release.yml) so a push to that repo's
        # main can't change what executes in this PR gate. To bump: pick the
        # new release-tools SHA/tag and update both the SHA and the version
        # comment below.
        run: |
          git clone https://github.com/protoLabsAI/release-tools /tmp/release-tools
          git -C /tmp/release-tools checkout 96159f8f3adf3cce60278cc689b67521ff5a547c # v2.3.0
          node /tmp/release-tools/bin/verify-workspace-config.mjs --root "$GITHUB_WORKSPACE"
      - name: Guard against the deleted server.py entrypoint
        # ADR 0023 promoted the monolith to the server/ package (launch:
        # `python -m server`). A launcher pointing at the old single-file binary
        # CrashLoopBackOffs (deploy) or silently no-ops (infra/autostart.py's exists()
        # check — missed by the original *.sh/*.yml-only net, fixed alongside this
        # guard's *.py extension). Two patterns: shell-style `python server.py`
        # launches, and Python-side quoted "server.py" path constructions
        # (e.g. `REPO_ROOT / "server.py"`). Excludes .github (self-match) and
        # tests/ (regression tests assert on the literal string).
        run: |
          if grep -rnE '(python[0-9]* +server\.py|"server\.py")' \
               --include='*.sh' --include='*.yaml' --include='*.yml' \
               --include='Dockerfile*' --include='*.py' \
               --exclude-dir=.github --exclude-dir=tests \
               --exclude-dir=node_modules --exclude-dir=.venv . ; then
            echo "::error::Stale single-file launch found — use 'python -m server' (ADR 0023)."
            exit 1
          fi
          echo "ok: no stale single-file launches in deploy artifacts or launchers"

  lint:
    name: Lint (ruff + import contracts)
    runs-on: ubuntu-latest  # workspace-config: allow-hosted-runner public repo — GH-hosted is free
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Ruff check
        # Pinned so a new ruff release can't add a rule that fails the gate
        # out from under a PR. Config + ignores live in pyproject.toml.
        run: |
          pip install ruff==0.15.10
          ruff check .
      - name: Import contracts (import-linter)
        # Architectural layering gate: graph/ and the infra packages must not
        # import server/ or operator_api/ (contracts + the grandfathered
        # burndown list live in pyproject.toml [tool.importlinter]). Static
        # AST analysis only — catches function-level (lazy) imports too and
        # needs no project deps installed. Pinned like ruff above.
        run: |
          pip install import-linter==2.11
          lint-imports

  tests:
    name: Python tests
    runs-on: ubuntu-latest  # workspace-config: allow-hosted-runner public repo — GH-hosted is free
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        # venv keeps tests/conftest.py's site.getsitepackages() reorder
        # resolving correctly (see #175).
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio
      - name: Run tests
        run: |
          . .venv/bin/activate
          python -m pytest tests/ -q

  fleet-integration:
    name: Fleet integration (multi-instance)
    runs-on: ubuntu-latest  # workspace-config: allow-hosted-runner public repo — GH-hosted is free
    # These tests boot real `python -m server` hub+member processes (against the
    # local scripts/fake_openai_server.py) on free loopback ports + tmp roots, so
    # they're much slower than the unit suite — allow ~10 min. Kept a SEPARATE job
    # from `tests` so its real-boot slowness never gates the fast unit run.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        # Mirror the `tests` job: full requirements.txt in a venv so
        # tests/conftest.py's site.getsitepackages() reorder resolves (#175).
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio
      - name: Boot real multi-instance fleet (hub + members) and exercise it
        # PA_RUN_INTEGRATION=1 flips on the real-subprocess harness the default
        # `pytest tests/` skips. Covers instance isolation, hub→member proxy
        # round-trip, cross-instance A2A delegation, and member crash→detect→restart
        # (POSIX zombie-reap — works on Linux). No network egress beyond loopback:
        # the fake gateway is local; mDNS advertise binds loopback only.
        run: |
          . .venv/bin/activate
          PA_RUN_INTEGRATION=1 python -m pytest tests/integration -q

  live-smoke:
    name: A2A live smoke (lean tier)
    runs-on: ubuntu-latest  # workspace-config: allow-hosted-runner public repo — GH-hosted is free
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lean (core) deps
        # requirements-core.txt is the PRODUCTION image's dependency set (the
        # `--ui none` tier). Installing it here — not the full requirements.txt —
        # also guards the lean-image import gap class (e.g. the FastAPI-missing
        # bug that only push-to-main caught, #426).
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt
      - name: Boot the real server vs a fake model + drive a real A2A turn
        # Catches the green-but-wire-broken class unit/mock tests miss — CRLF SSE
        # framing, A2A routing + version negotiation, agent-card build, lean boot.
        run: |
          . .venv/bin/activate
          python scripts/live_smoke.py

  web-e2e:
    name: Web E2E smoke
    runs-on: ubuntu-latest  # workspace-config: allow-hosted-runner public repo — GH-hosted is free
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests (vitest)
        # Pure-logic unit tests (chat-store reducers, the A2A SSE frame parser,
        # the uiStore persist migration). Fast — runs before the heavier
        # Playwright path so a reducer regression fails the job early.
        run: npm run test:unit --workspace @protoagent/web
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright browser + deps
        # The chromium binary is the slow ~100MB CDN download that intermittently
        # stalled ~10min until the job-level orphan-kill fired (#1167). Cache it keyed
        # on the Playwright version (skips the download entirely on a hit — only the
        # fast apt system-deps run then), and hard-cap each attempt with `timeout` so
        # a stalled download fails fast and retries instead of hanging the whole job.
        timeout-minutes: 8
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            cmd="playwright install-deps chromium"   # binary cached → apt deps only
          else
            cmd="playwright install --with-deps chromium"
          fi
          for attempt in 1 2 3; do
            if timeout 240 npm --workspace @protoagent/web exec -- $cmd; then
              exit 0
            fi
            echo "::warning::playwright install attempt $attempt stalled/failed; retrying…"
            sleep 5
          done
          echo "::error::playwright install failed after 3 attempts"
          exit 1
      - name: Run E2E smoke (built SPA vs mock backend)
        # Builds the web app, then drives it with Playwright against the
        # deterministic mock backend (apps/web/e2e/mock-server.mjs) — no Python,
        # model, or network. Guards the operator-console rendering contract:
        # tool-call cards, markdown, slash commands, runtime panel.
        run: npm run test:e2e --workspace @protoagent/web
