name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build Application
        run: |
          # Placeholder for build logic
          echo "Building application..."

  build-windows:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build Windows Executable
        run: |
          pyinstaller --onefile --name protoAgent main.py
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoAgent-windows
          path: dist/protoAgent.exe

  sign-windows:
    runs-on: windows-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: protoAgent-windows
          path: ./dist
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Sign Windows Executable
        uses: azure/keyvault-sign@v1
        with:
          key-vault-name: ${{ secrets.AZURE_KEY_VAULT_NAME }}
          certificate-name: ${{ secrets.AZURE_CERT_NAME }}
          file-path: ./dist/protoAgent.exe
          timestamp-server: http://timestamp.digicert.com
      - name: Upload Signed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoAgent-windows-signed
          path: ./dist/protoAgent.exe

  publish-release:
    runs-on: ubuntu-latest
    needs: sign-windows
    steps:
      - name: Download Signed Artifact
        uses: actions/download-artifact@v4
        with:
          name: protoAgent-windows-signed
          path: ./release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/protoAgent.exe
          generate_release_notes: true