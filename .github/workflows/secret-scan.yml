name: Secret scan

# Block any secret from reaching the repo's files (postmortem 2026-06-09: a gateway API
# key reached main via #749, swept in by `git add -A` of a per-instance config dir).
# Scans the working TREE (`--no-git`) so it catches secrets in committed files without
# failing on the historical leak still in git history (that risk is handled by rotation).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (tree)
    runs-on: namespace-profile-protolabs-linux
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan tracked files
        run: gitleaks detect --no-git --redact --no-banner --exit-code 1
