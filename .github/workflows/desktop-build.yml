name: Desktop Build

# Builds the protoAgent desktop app — the Tauri shell + its PyInstaller server
# sidecar (apps/desktop/sidecar/build_sidecar.py) — for all three desktop
# platforms and attaches the artifacts to the GitHub release:
#
#   - macOS   .dmg (aarch64)            signed + notarized (org Apple Developer ID)
#   - Linux   .AppImage + .deb (x86_64) unsigned; built on ubuntu-22.04 so the
#                                       PyInstaller sidecar reaches the oldest glibc
#                                       a hosted runner can target (2.35)
#   - Windows NSIS -setup.exe (x86_64)  unsigned (no Windows signing identity yet —
#                                       expect a SmartScreen prompt)
#
# Every leg smoke-tests the actual frozen sidecar (scripts/live_smoke.py --bin
# boots it and drives a real A2A turn) BEFORE the slow Tauri bundle step, so
# per-platform PyInstaller under-collection fails the build, not the first user.
#
# When the org updater signing key is present, every leg also emits signed
# updater bundles, and the updater-manifest fan-in job composes latest.json
# (the manifest the in-app updater polls) onto the release — uploaded last.
#
# Fires on MINOR/MAJOR semver tags (a `.0` patch component) alongside release.yml's
# Docker build, and on manual dispatch. PATCH tags (vX.Y.Z, Z>0) are skipped — a
# patch is a server/Docker fix and rebuilding the 10×-billed macOS leg per patch is
# the bulk of CI cost; dispatch this workflow manually with the tag for a patch that
# genuinely needs a desktop rebuild. Dispatch macOS builds are unsigned unless the
# full signing secret set is present; Linux/Windows are always unsigned. See
# ADR 0010 (UI tiers / desktop).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to build against (blank = current ref)'
        required: false

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # upload release assets

jobs:
  build:
    name: ${{ matrix.target }}
    # Skip PATCH releases: desktop legs (esp. GitHub-hosted macOS at 10× billing)
    # rebuild on every tag, but a patch is almost always a server/Docker fix — the
    # in-app updater can wait for the next minor. Build only on a `.0` tag
    # (minor/major), or any manual dispatch (the escape hatch for a patch that DOES
    # need a desktop rebuild — dispatch this workflow with the tag). Patch releases
    # still ship Docker + the GitHub release via release.yml; they just carry no new
    # desktop binaries, and latest.json keeps pointing at the last minor's build.
    if: >-
      github.repository == 'protoLabsAI/protoAgent'
      && (github.event_name == 'workflow_dispatch' || endsWith(github.ref_name, '.0'))
    # Per-leg runner, overridable by repo variable so the expensive macOS/Windows
    # legs can move off GitHub-hosted runners (10×/2× billing multipliers) onto
    # Namespace profiles WITHOUT editing this file — the moment the org provisions
    # `namespace-profile-protolabs-{macos,windows}`, set DESKTOP_{MACOS,WINDOWS}_RUNNER
    # and the next release builds there. Defaults preserve today's hosted runners
    # exactly (no behaviour change until a var is set). Same fork-friendly pattern as
    # RELEASE_ENABLED / NSC_CONTAINER_REGISTRY. NB the Linux leg's default stays
    # ubuntu-22.04 ON PURPOSE — it links the PyInstaller sidecar against the oldest
    # glibc for broadest AppImage reach; only point DESKTOP_LINUX_RUNNER at a
    # Namespace profile whose base image is glibc ≤ 2.35 (Ubuntu 22.04).
    runs-on: >-
      ${{ matrix.target == 'aarch64-apple-darwin' && (vars.DESKTOP_MACOS_RUNNER || 'macos-14')
      || matrix.target == 'x86_64-pc-windows-msvc' && (vars.DESKTOP_WINDOWS_RUNNER || 'windows-latest')
      || (vars.DESKTOP_LINUX_RUNNER || 'ubuntu-22.04') }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon runner
            target: aarch64-apple-darwin
            bundles: dmg
          - os: ubuntu-22.04      # oldest hosted runner = broadest glibc reach
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        # Tauri v2's webkit/gtk toolchain + ayatana-appindicator for the tray
        # (the runtime side of this dep is declared in tauri.conf.json's
        # bundle.linux.deb.depends; AppImage bundles it).
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Read version
        id: version
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          case "${TAG}" in
            v[0-9]*.[0-9]*.[0-9]*) VERSION="${TAG#v}" ;;
            *) VERSION="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')" ;;
          esac
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp app version
        shell: bash
        # tauri.conf.json stays a placeholder in-tree; stamp the real version at
        # build time so bundle metadata (DMG/installer/add-remove-programs)
        # reports it instead of the placeholder (version-coherence: the desktop
        # must not claim a version pyproject doesn't).
        run: |
          V="${{ steps.version.outputs.version }}"
          CONF=apps/desktop/src-tauri/tauri.conf.json
          jq --arg v "$V" '.version = $v' "$CONF" > "$CONF.tmp"
          mv "$CONF.tmp" "$CONF"
          echo "tauri.conf.json version -> $V"

      - name: Build server sidecar (PyInstaller)
        shell: bash
        # Freezes `server` into binaries/protoagent-server-<triple> — the
        # externalBin Tauri bundles. The React console is the UI; no server-side
        # UI extras are bundled.
        # mcp[cli] is a build-env requirement, not a runtime dep: --collect-all
        # mcp imports every mcp submodule, and mcp.cli hard-errors at import
        # when typer is missing (broke all legs once an unpinned mcp drifted).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller "mcp[cli]"
          python apps/desktop/sidecar/build_sidecar.py
          ls -la apps/desktop/src-tauri/binaries/

      - name: Smoke-test the frozen sidecar
        shell: bash
        # Boot the actual frozen binary (not the venv server) against the fake
        # OpenAI endpoint and drive a real A2A turn — catches per-platform
        # PyInstaller under-collection before the slow Tauri bundle step.
        # 180s healthz budget: onefile binaries self-extract on first boot (and
        # Windows Defender scans them).
        run: |
          BIN="apps/desktop/src-tauri/binaries/protoagent-server-${{ matrix.target }}"
          if [ "${RUNNER_OS}" = "Windows" ]; then BIN="${BIN}.exe"; fi
          python scripts/live_smoke.py --bin "${BIN}" --timeout 180

      - name: Install web + desktop deps
        shell: bash
        # Root install wires the @protoagent/web workspace (tauri's
        # beforeBuildCommand builds it); desktop install brings the tauri CLI.
        run: |
          npm ci
          ( cd apps/desktop && npm install )

      - name: Build + sign the app
        id: build
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: '13.0'
        run: |
          set -euo pipefail
          cd apps/desktop
          SIGNED="unsigned (dev)"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            # tauri-bundler signs as soon as *any* Apple secret is set, then fails
            # if the set is incomplete. Require the full set; otherwise unset all so
            # a dispatch build falls back cleanly to unsigned.
            if [ -n "${APPLE_CERTIFICATE}" ] && [ -n "${APPLE_CERTIFICATE_PASSWORD}" ] \
               && [ -n "${APPLE_SIGNING_IDENTITY}" ] && [ -n "${APPLE_API_ISSUER}" ] \
               && [ -n "${APPLE_API_KEY}" ] && [ -n "${APPLE_API_KEY_BASE64}" ] \
               && [ -n "${APPLE_TEAM_ID}" ]; then
              # tauri expects APPLE_API_KEY_PATH = a .p8 file; the secret is its base64.
              KEYFILE="$(mktemp -t protoagent-apple-api-XXXXXX).p8"
              python3 -c 'import base64,os,sys; open(sys.argv[1],"wb").write(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))' "$KEYFILE"
              export APPLE_API_KEY_PATH="${KEYFILE}"
              SIGNED="Developer ID (signed + notarized)"
            elif [ "${{ github.event_name }}" = "push" ]; then
              echo "::error::Semver-tag desktop releases require the full Apple signing secret set."
              exit 2
            else
              unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                    APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_BASE64 APPLE_TEAM_ID
            fi
          else
            # No Linux/Windows signing identity yet — ship unsigned and make sure
            # the bundler never sees the Apple env.
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                  APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_BASE64 APPLE_TEAM_ID
            SIGNED="unsigned (${RUNNER_OS})"
          fi
          [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ] || unset TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          echo "Signing mode: ${SIGNED}"
          if [ "${SIGNED}" = "Developer ID (signed + notarized)" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi
          BUNDLES="${{ matrix.bundles }}"
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            # Signed updater artifacts (.app.tar.gz / -setup.nsis.zip /
            # .AppImage.tar.gz + .sig). v1Compatible = the shapes release-tools'
            # build-updater-manifest detects. Injected here, not in-tree, so
            # keyless local builds don't fail on a missing signing key. The
            # macOS updater bundle derives from the .app — add that target.
            if [ "${RUNNER_OS}" = "macOS" ]; then BUNDLES="app,dmg"; fi
            npm run build -- --bundles "$BUNDLES" \
              --config '{"bundle":{"createUpdaterArtifacts":"v1Compatible"}}'
          else
            echo "No updater signing key — building without updater artifacts."
            npm run build -- --bundles "$BUNDLES"
          fi

      - name: Smoke-test the SIGNED sidecar (macOS)
        if: runner.os == 'macOS' && steps.build.outputs.signed == 'true'
        shell: bash
        # The pre-bundle smoke (above) boots the UNSIGNED PyInstaller binary, so it
        # CANNOT see a signing-induced failure. Hardened-runtime signing turns on
        # library validation, which refuses to dlopen the frozen Python.framework
        # (a different Team ID) unless `disable-library-validation` is entitled —
        # exactly the regression that shipped a dead backend in v0.35.0 (sidecar
        # never started → console up, every API call failing). Boot the SIGNED
        # sidecar from the freshly-bundled .app so that class of bug fails the
        # build here, not in a user's hands.
        run: |
          set -euo pipefail
          APP="$(ls -d apps/desktop/src-tauri/target/release/bundle/macos/*.app | head -1)"
          BIN="${APP}/Contents/MacOS/protoagent-server"
          echo "Smoking signed sidecar: ${BIN}"
          python scripts/live_smoke.py --bin "${BIN}" --timeout 180

      - name: Collect artifacts
        shell: bash
        # Normalize every bundle into dist-desktop/ as
        # protoAgent-<version>-<target>.<ext> so upload/release steps are
        # platform-agnostic.
        run: |
          set -euo pipefail
          V="${{ steps.version.outputs.version }}"
          T="${{ matrix.target }}"
          B="apps/desktop/src-tauri/target/release/bundle"
          mkdir -p dist-desktop
          # Updater bundles (+ .sig) exist only when the signing key was present.
          # The renamed files keep the target triple + the exact suffixes that
          # release-tools' build-updater-manifest classifies by.
          case "${RUNNER_OS}" in
            macOS)
              cp "$(ls "${B}"/dmg/*.dmg | head -1)" "dist-desktop/protoAgent-${V}-${T}.dmg"
              UP="$(ls "${B}"/macos/*.app.tar.gz 2>/dev/null | head -1 || true)"
              if [ -n "${UP}" ]; then
                cp "${UP}" "dist-desktop/protoAgent-${V}-${T}.app.tar.gz"
                cp "${UP}.sig" "dist-desktop/protoAgent-${V}-${T}.app.tar.gz.sig"
              fi ;;
            Linux)
              cp "$(ls "${B}"/appimage/*.AppImage | head -1)" "dist-desktop/protoAgent-${V}-${T}.AppImage"
              cp "$(ls "${B}"/deb/*.deb | head -1)" "dist-desktop/protoAgent-${V}-${T}.deb"
              UP="$(ls "${B}"/appimage/*.AppImage.tar.gz 2>/dev/null | head -1 || true)"
              if [ -n "${UP}" ]; then
                cp "${UP}" "dist-desktop/protoAgent-${V}-${T}.AppImage.tar.gz"
                cp "${UP}.sig" "dist-desktop/protoAgent-${V}-${T}.AppImage.tar.gz.sig"
              fi ;;
            Windows)
              cp "$(ls "${B}"/nsis/*-setup.exe | head -1)" "dist-desktop/protoAgent-${V}-${T}-setup.exe"
              UP="$(ls "${B}"/nsis/*.nsis.zip 2>/dev/null | head -1 || true)"
              if [ -n "${UP}" ]; then
                cp "${UP}" "dist-desktop/protoAgent-${V}-${T}-setup.nsis.zip"
                cp "${UP}.sig" "dist-desktop/protoAgent-${V}-${T}-setup.nsis.zip.sig"
              fi ;;
          esac
          ls -la dist-desktop/

      - name: Notarize + staple the DMG container
        if: runner.os == 'macOS' && steps.build.outputs.signed == 'true'
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        # Tauri notarizes the .app *inside* the bundle; without its own ticket
        # the DMG container still reads as un-notarized on a fresh download.
        # Submit + staple the DMG itself so Gatekeeper verifies it offline.
        run: |
          set -euo pipefail
          DMG="$(ls dist-desktop/*.dmg | head -1)"
          KEYFILE="$(mktemp -t protoagent-apple-api-XXXXXX).p8"
          python3 -c 'import base64,os,sys; open(sys.argv[1],"wb").write(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))' "$KEYFILE"
          xcrun notarytool submit "$DMG" \
            --key "$KEYFILE" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Verify macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        # Pristine-artifact battery (scripts/verify-macos-desktop.sh): structure
        # always; codesign/entitlements/Gatekeeper/stapler asserts when signed.
        run: |
          set -euo pipefail
          FLAG=""
          if [ "${{ steps.build.outputs.signed }}" = "true" ]; then FLAG="--require-signed"; fi
          scripts/verify-macos-desktop.sh $FLAG dist-desktop/*.dmg

      - name: Upload dispatch artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: protoAgent-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: dist-desktop/*

      - name: Attach to release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.version.outputs.tag }}" dist-desktop/* --clobber

  # Fan-in: compose latest.json from every leg's signed updater bundle and
  # upload it LAST, so the manifest never points at assets that don't exist
  # yet. Runs only on semver tags, and only once ALL legs succeeded (a partial
  # manifest would skew versions across platforms). If the release carries no
  # updater bundles (key wasn't present), it skips — in-app updates are simply
  # disabled for that release.
  updater-manifest:
    name: updater manifest (latest.json)
    needs: build
    # `needs: build` already skips this when the matrix is skipped (patch tag), but
    # mirror the `.0` guard so the intent is explicit and a dispatch run (no release
    # to attach to) doesn't try to compose a manifest.
    if: >-
      github.event_name == 'push' && github.repository == 'protoLabsAI/protoAgent'
      && endsWith(github.ref_name, '.0')
    runs-on: ubuntu-latest  # workspace-config: allow-hosted-runner public repo — GH-hosted is free
    timeout-minutes: 10
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compose + upload latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          mkdir -p updater-dist
          gh release download "$TAG" --repo "${{ github.repository }}" --dir updater-dist \
            --pattern '*.app.tar.gz*' --pattern '*-setup.nsis.zip*' --pattern '*.AppImage.tar.gz*' \
            2>/dev/null || true
          if ! ls updater-dist/* >/dev/null 2>&1; then
            echo "::notice::No signed updater bundles on the release — skipping latest.json (in-app updates disabled for ${TAG})."
            exit 0
          fi
          # Use the real GitHub Release body as the updater notes, so the in-app
          # UpdateNotice shows the actual changelog (not a generic placeholder). By the
          # time this fan-in runs (after the long desktop matrix), release.yml has long
          # since created + populated the release. Fall back to the placeholder if the
          # body is somehow empty.
          NOTES="$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q .body 2>/dev/null || true)"
          [ -z "$NOTES" ] && NOTES="protoAgent ${TAG} — see the GitHub Release for details."
          npx --yes -p '@protolabsai/release-tools@latest' build-updater-manifest \
            --version "$VERSION" \
            --dist updater-dist \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${TAG}" \
            --notes "$NOTES" \
            --out latest.json
          cat latest.json
          # --repo is required: this job never checks out the repo (it only
          # `gh release download`s bundles), so without it `gh release upload`
          # tries to infer the repo from `git remote` and dies with
          # "not a git repository" — stranding latest.json off the release
          # (the in-app updater manifest). The download step above already
          # passes --repo for the same reason.
          gh release upload "$TAG" latest.json --repo "${{ github.repository }}" --clobber
          # Promote to 'Latest' ONLY now that latest.json (and every binary) is on the
          # release — this closes the in-app-updater 404 window. release.yml creates the
          # release with --latest=false, so it becomes 'Latest' exactly here, after the
          # manifest exists. (The no-bundles path above exits 0 before this, so an
          # unsigned build never gets promoted — 'Latest' stays on the last good .0.)
          gh release edit "$TAG" --repo "${{ github.repository }}" --latest
